name: Build Android

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android NDK
        run: sdkmanager --install "ndk;21.4.7075529"

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Install hmm
        run: haxelib install hmm

      - name: Cache haxelib dependencies
        uses: actions/cache@v4
        with:
          path: ~/haxelib
          key: ${{ runner.os }}-haxelib-${{ hashFiles('hmm.json') }}
          restore-keys: |
            ${{ runner.os }}-haxelib-

      - name: Install dependencies
        run: haxelib run hmm install

      - name: Setup Lime
        run: haxelib run lime setup -y

      - name: Configure Lime for Android
        run: |
          haxelib run lime config ANDROID_SDK "$ANDROID_SDK_ROOT"
          haxelib run lime config ANDROID_NDK_ROOT "$ANDROID_SDK_ROOT/ndk/21.4.7075529"
          haxelib run lime config JAVA_HOME "$JAVA_HOME"
          haxelib run lime config ANDROID_SETUP true

      - name: Generate Android keystore
        run: |
          mkdir -p Certificates
          keytool -genkeypair -v \
            -keystore Certificates/android.keystore \
            -alias android \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Shark, OU=Brenninho, O=Brenninho, L=Unknown, S=Unknown, C=BR"

      - name: Build Android
        timeout-minutes: 15
        run: |
          set -o pipefail
          attempt=1
          max_attempts=2

          until haxelib run lime build android -final; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Build failed after $max_attempts attempts"
              exit 1
            fi

            echo "Build attempt $attempt failed, retrying..."
            attempt=$((attempt + 1))
          done

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Shark-Android
          path: export/android/bin/app/build/outputs/apk
          retention-days: 7

name: Build iOS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-13

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - name: Install hmm
        run: haxelib install hmm

      - name: Cache haxelib dependencies
        uses: actions/cache@v4
        with:
          path: ~/haxelib
          key: ${{ runner.os }}-haxelib-${{ hashFiles('hmm.json') }}
          restore-keys: |
            ${{ runner.os }}-haxelib-

      - name: Install dependencies
        run: haxelib run hmm install

      - name: Setup Lime
        run: haxelib run lime setup -y

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build iOS (simulator)
        run: haxelib run lime build ios -simulator -final

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Shark-iOS-Simulator
          path: export/ios/build/Release-iphonesimulator

name: Build macOS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-15-intel
    timeout-minutes: 30
    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      HOMEBREW_NO_ENV_HINTS: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7
        timeout-minutes: 10

      - name: Install hmm
        run: haxelib install hmm

      - name: Cache haxelib dependencies
        uses: actions/cache@v4
        with:
          path: ~/haxelib
          key: ${{ runner.os }}-haxelib-${{ hashFiles('hmm.json') }}
          restore-keys: |
            ${{ runner.os }}-haxelib-

      - name: Install dependencies
        run: haxelib run hmm install

      - name: Setup Lime
        run: haxelib run lime setup -y

      - name: Build macOS
        timeout-minutes: 15
        run: |
          set -o pipefail
          attempt=1
          max_attempts=2

          until haxelib run lime build mac -final; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Build failed after $max_attempts attempts"
              exit 1
            fi

            echo "Build attempt $attempt failed, retrying..."
            attempt=$((attempt + 1))
          done

      - name: List build output for debugging
        if: always()
        run: find export/mac -maxdepth 4 -type d

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Shark-macOS
          path: export/mac
          retention-days: 7
